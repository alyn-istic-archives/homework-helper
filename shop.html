<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave: New Motion</title>
<!--     
    <link rel="icon" type="image/png" href="assets/favicon.png"> -->
    <link rel="stylesheet" href="shop.css">
    <link rel = "stylesheet" href="homepage.css">
    <link rel = "stylesheet" href="styles.css">
    <link rel = "stylesheet" href="session.css">
    <link rel="stylesheet" href="wave.css">
</head>

<body>

<body>
    

    <div class = "ocean">
        <div class = "wave"></div>
        <div class = "wave"></div>
    </div>
    <div class = "header">
        <img src="images/logo.png" width="350" height="171" id = "logo" class="shop-logo" onclick="window.location.href='homepage.html';">
        <button class = "nav-btn" id = "nav-btn"> ☰ </button>
        <div class = "sidebar-total">
            <div class = "sidebar">
                <img src="images/bluecry.png" alt="Homework Helper">
                <a href = "homepage.html"> Hours </a>
                <a class = "active"> shop </a>
            
            </div>
        </div>
        <div class = "header-content">
            <div class = "currency"> hours:
                <p class = "hours-logged" id = "hours-logged"> </p>  
            </div>
            <button id = "new-item"> new goal !!</button> 
            <span>  yapayapayapatapatyapyapyapaypyapayap</span>
            <button id = "clear-bought" class = "bought-btn"> clear bought </button>
            <button id = "show-shop" class = "bought-btn"> show shop </button>
            <button id = "show-bought" class = "bought-btn"> show bought </button>
        </div>
    </div>

    <container>

        <div class = "content">
            <!-- <select id="dynamicDropdown">
                <option disabled selected>Select an option</option>
            </select>
            <button id = "convert"> convert horus</button> -->
            <div class = "shop-output" id = "shop-output"> items.. </div>
        </div>
        

        <div class = "popup-overlay"></div>
        <form class = "item-popup" id = "shop-form">
            <h3 class = "sh1"> New Goal/Item </h3>
            <input type="text" id="item-name" class = "session-coursebox" placeholder="Goal Name">
            <label> Cost: <input type="number" id="item-value" class = "session-numbox"></label>
            <input type="text" id="item-details" class = "session-textbox" placeholder="Details">

                <label>Type:</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="item-type" value="single" checked> One-time
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="item-type" value="renewable"> Renewable
                    </label>
                </div>


            <button type="submit" id="submit-item"> submit </button>
            <button type = "button" id="close-item"> Close </button>
        </form>

        
        <form class = "cantbuy-popup" id = "cantbuy-form">
            <h1> sorry! you don't have enough hours for this!</h1>
            <button type = "button" id="close-cantbuy"> Close </button>
        </form>

        <div class = "popup-overlay"></div>
        <form class = "delete-popup" id = "delete-form">
            <h1> are you sure you want to delete this ?</h1>
            <div class = button-set>
                <button type = "button" id="yes-delete"> Yes </button>
                <button type = "button" id="no-delete"> No </button>
            </div>
        </form>
    </container>
    
    <script src="shop.js"></script>
    <script src="script.js"></script>
    

</body>


</html>
