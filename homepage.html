<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Wave: New Motion </title>
    
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel = "stylesheet" href="homepage.css">
    <link rel = "stylesheet" href="styles.css">
    <link rel = "stylesheet" href="session.css">
    <link rel="stylesheet" href="timer.css">
    <link rel="stylesheet" href="wave.css">
</head>

<body>
    <div class = "ocean">
        <div class = "wave"></div>
        <div class = "wave"></div>
    </div>
    <div class = "header">
        <img src="images/logo.png" class = "logo" id = "logo"onclick="window.location.href='index.html';">
        <button class = "nav-btn" id = "nav-btn"> ☰ </button>
        <div class = "sidebar-total">
            <div class = "sidebar">
                <img src="images/bluecry.png" alt="Homework Helper">
                <a class = "active"> Hours </a>
                <a href = "shop.html"> Shop </a>
                <a href = "guy.html"> DO NOT CLICK </a>  
            </div>
            
        </div>
        <div class = "header-content">
            <div class = "currency"> hours:
                    <p class = "hours-logged" id = "hours-logged"> </p>  
            </div>
        </div> 
        
        <div class = "timercontainer">  
                <div class="time">
                    <span class="digit" id="hr">
                        00 
                    </span>
                    <span> : </span>
                    <span class="digit" id="min">
                        00 
                    </span>
                    <span> : </span>
                    <span class="digit" id="sec">
                        00
                    </span>
                    <span class="digit" id="count">
                    </span>
                </div>
                <div class = "time-btns">
                    <button class="tbtn" id="start">
                        Start
                    </button>
                    <button class="tbtn" id="save">
                        Save
                    </button>
                    <button class="tbtn" id="stop">
                        Pause
                    </button>
                    <!-- <button class="tbtn" id="reset">
                        Reset
                    </button> -->
                </div>
        </div>
        <div class="courses">
            <select id="coursebtns" class="course-select">
                <option value="all">All Courses</option>
                <option value="urhgh"> idk </option>
            </select>
        </div>
    </div>
    <container>

        <!-- <div class = "courses">
            <div id = "coursebtns" class = "course-set"></div> 
        </div>
         -->

        
        <div class = "content"> 
            <div class = "session-output"id = "session-output"></div>
        </div>
        
        <div class = "popup-overlay"></div>
        <form class = "session-popup" id = "session-form">
            <h3 class = "sh1"> New Assignment </h3>
            <label> Course*</label>
            <input type="text" id="session-name" class = "session-coursebox" placeholder="Course">
            <label> Hours (Redeemable):*</label>
            <input type="text" id="session-hours" class = "session-numbox" value="Example" readonly>
            <label> Time spent on Project:</label>
            <input type="text" id="session-time" class = "session-numbox" value="notwork" readonly>
            <label> Details:</label> <textarea id="session-details" class = "session-textbox" placeholder="Optional notes on assignment"></textarea>

            <button type="submit" id="submit-session"> submit </button>
            <button type = "button" id="close-session"> Close </button>
        </form>

        <div class = "popup-overlay"></div>
        <form class = "delete-popup" id = "delete-form">
            <h1> are you sure you want to delete this ?</h1>
            <div class = button-set>
                <button type = "button" id="yes-delete"> Yes </button>
                <button type = "button" id="no-delete"> No </button>
            </div>
        </form>

    </container>
    
    <script src="script.js"></script>
    <script src="timer.js"></script>
    <script src = "course.js"></script>

</body>
</html>
